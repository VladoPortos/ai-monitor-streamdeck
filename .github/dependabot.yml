version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      types:
        patterns: ["@types/*"]
      lint-and-format:
        patterns: ["eslint*", "@typescript-eslint/*", "prettier"]
      vitest:
        patterns: ["vitest", "@vitest/*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
